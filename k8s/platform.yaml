apiVersion: v1
kind: ConfigMap
metadata:
  name: healthcare-config
  namespace: healthcare
data:
  JWT_SECRET: supersecretkey
  PATIENT_SERVICE_URL: http://patient-service:5001
  DOCTOR_SERVICE_URL: http://doctor-service:5002
  APPOINTMENT_SERVICE_URL: http://appointment-service:5003
  PAYMENT_SERVICE_URL: http://payment-service:5005
  TELEMEDICINE_SERVICE_URL: http://telemedicine-service:5006
  NOTIFICATION_SERVICE_URL: http://notification-service:5004
  DOCTOR_ME_PATH: /api/doctors/me
  DOCTOR_AVAILABILITY_PATH: /api/availability/doctor/:doctorId
  DOCTOR_BOOK_SLOT_PATH: /api/availability/:availabilityId/book
  DOCTOR_RELEASE_SLOT_PATH: /api/availability/:availabilityId/release
  APPOINTMENT_QUEUE_NAME: appointment.created
  JITSI_BASE_URL: https://meet.jit.si
  FRONTEND_URL: http://localhost:5173
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
  MONGO_HOST: mongodb
  MONGO_PORT: "27017"
---
apiVersion: v1
kind: Secret
metadata:
  name: healthcare-secrets
  namespace: healthcare
type: Opaque
stringData:
  MONGO_ROOT_USERNAME: admin
  MONGO_ROOT_PASSWORD: password
  CLOUDINARY_CLOUD_NAME: ""
  CLOUDINARY_API_KEY: ""
  CLOUDINARY_API_SECRET: ""
  EMAIL_USER: ""
  EMAIL_PASS: ""
  STRIPE_SECRET_KEY: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: healthcare
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: MONGO_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: MONGO_ROOT_PASSWORD
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: healthcare
spec:
  selector:
    app: mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: guest
            - name: RABBITMQ_DEFAULT_PASS
              value: guest
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: healthcare
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: hms/patient-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: JWT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: healthcare-config
                  key: JWT_SECRET
            - name: MONGO_URI
              value: mongodb://admin:password@mongodb:27017/patient-service?authSource=admin
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: CLOUDINARY_API_SECRET
---
apiVersion: v1
